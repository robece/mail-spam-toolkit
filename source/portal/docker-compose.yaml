services:
  portal:
    build: .
    container_name: mail-spam-toolkit-portal
    user: "${UID}:${GID}"
    ports:
      - "8080:8080"
    volumes:
      - ../data:/workspace/data          # .eml source files (external, volatile)
      - ./database:/workspace/database   # SQLite (persistent, part of portal)
      - ./temp:/workspace/temp           # extracted attachments (on-demand, ephemeral)
      - ./frontend:/workspace/frontend   # static files (hot-reload without rebuild)
    environment:
      - DATA_DIR=/workspace/data
      - DB_DIR=/workspace/database
      - DB_PATH=/workspace/database/spam_toolkit.db
      - TEMP_DIR=/workspace/temp
    restart: unless-stopped

  sqlite-web:
    image: coleifer/sqlite-web
    container_name: mail-spam-toolkit-sqlite
    ports:
      - "8081:8080"
    volumes:
      - ./database:/data
    entrypoint: ["sqlite_web", "-H", "0.0.0.0", "-p", "8080", "/data/spam_toolkit.db"]
    restart: unless-stopped
