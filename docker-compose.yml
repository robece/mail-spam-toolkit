services:
  mail-spam-toolkit-portal:
    build: ./source/portal
    image: mail-spam-toolkit-portal:local
    container_name: mail-spam-toolkit-portal
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - mail-spam-toolkit-db:/workspace/database
      - ./source/portal/frontend:/workspace/frontend
    environment:
      DB_PATH: /workspace/database/spam_toolkit.db
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
    networks:
      - mail-spam-toolkit-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mail-spam-toolkit-sqlite:
    image: coleifer/sqlite-web:latest
    container_name: mail-spam-toolkit-sqlite
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - mail-spam-toolkit-db:/data
    entrypoint: ["sqlite_web", "-H", "0.0.0.0", "-p", "8080", "/data/spam_toolkit.db"]
    networks:
      - mail-spam-toolkit-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mail-spam-toolkit-db:
    name: mail-spam-toolkit-db

networks:
  mail-spam-toolkit-network:
    name: mail-spam-toolkit-network
    driver: bridge
